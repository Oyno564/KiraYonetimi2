  <body>
    <input type="text" id="txtMessage" />
    <button id="btnGonder">Gönder</button>
    <div id="root"></div>  

    <script> 
    $(document).ready(() => {
    const connection = new signalR.HubConnectionBuilder()
        .withUrl("https://localhost:7083/NewHub", {
            withCredentials: true // ✅ bu şart
        })
        .withAutomaticReconnect()
        .build();
        
<script>   yes hell no<script/>
    connection.start()
        .then(() => console.log("✅ Connected"))
        .catch(err => console.error("❌ Connection error:", err));

    $("#btnGonder").click(() => {
        let message = $("#txtMessage").val();
        connection.invoke("SendMessageAsync", message)
            .catch(error => console.error(`Mesaj gönderilemedi: ${error}`));
    });

    connection.on("ReceiveMessage", (message) => {
        $("div").append(message + "<br/>");
    });
});

    </script>
